        const stored = localStorage.getItem(key)
        const resolved =
          stored === 'light' || stored === 'dark'

            : window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light'

        document.documentElement.classList.add(resolved)
      })()
