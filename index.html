  <script>
    (() => {
      const key = 'csy20-theme'
      const stored = localStorage.getItem(key)
      const resolved =
        stored === 'light' || stored === 'dark'
          ? stored
          : window.matchMedia('(prefers-color-scheme: dark)').matches
            ? 'dark'
            : 'light'

      if (resolved === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark')
      }
    })()
  </script>
