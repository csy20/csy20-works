<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Chitresh Yadav builds polished Flutter products with a strong focus on UX, performance, and reliable delivery."
    />
    <script>
      (() => {
        const key = 'csy20-theme'
        const stored = localStorage.getItem(key)
        const resolved =
          stored === 'light' || stored === 'dark'
            ? stored
            : window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light'

        document.documentElement.classList.add(resolved)
      })()
    </script>
    <meta name="theme-color" content="#201812" />
    <title>csy20.works | Chitresh Yadav</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
